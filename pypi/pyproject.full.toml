[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nucleobench"
version = "1.0.5"
description = "Nucleobench optimizers and tasks."
readme = "README.md"
requires-python = ">=3.10"
authors = [
    {name = "Move37 Labs", email = "joel.shor@move37labs.com"}
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
]
dependencies = [
    "torch>=2.2",
    "lightning",
    "pytorch-lightning>=2.0,<3.0",
    "gReLU==1.0.5",
    "wandb",
    "bpnet-lite==0.8.1",
    "numpy>=1.16,<2.0.0",
    "scipy",
    "pandas",
    "h5py",
    "pyarrow",
    "fastparquet",
    "google-cloud-storage",
    "gcsfs",
    "pyBigWig==0.3.25",
    "xxhash",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-xdist",
    "pytest-repeat",
    "pytest-cov",
    "coverage",
    "pyclean",
]

[project.urls]
"Homepage" = "https://github.com/move37-labs/nucleobench"
"Bug Tracker" = "https://github.com/move37-labs/nucleobench/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["nucleobench", "nucleobench.*"]

[tool.black]
line-length = 88
target-version = ["py310", "py311"]

[tool.isort]
profile = "black"
line_length = 88

[tool.pytest.ini_options]
testpaths = ["nucleobench"]
python_files = "*_test.py"