name: Gemini PR review

on:
  # Fires when a pull request targeting main is opened, reopened, or synchronized
  pull_request:
    branches: [ "main" ]
    types: [opened, reopened, synchronize]

  # Manual re-review: comment "@gemini-cli /review" on any PR.
  issue_comment:
    types: [created]

jobs:
  review:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(fromJSON('["OWNER", "COLLABORATOR", "MEMBER"]'), github.event.comment.author_association) &&
       contains(github.event.comment.body, '@gemini'))
    permissions:
      contents: read
      pull-requests: write
      issues: write
    strategy:
      fail-fast: false
      matrix:
        persona:
          - key: code-hygiene
            name: "Code Hygiene and Coverage"
            model: "gemini-2.5-flash"
            instructions: |
              You are a senior software engineer focused on code hygiene, test coverage, and repository conventions.
              Your job is to ensure that the code changes follow the repository's coding conventions and have adequate test coverage.

              Focus your review on:
              - **Code Hygiene**: Check for clean, readable, and maintainable code.
              - **Repo Conventions**: Ensure the code adheres to standard coding conventions used in this repository.
              - **Test Coverage**: Check if tests were added or updated to cover the new changes.
          - key: algorithmic
            name: "Algorithmic Review"
            model: "gemini-2.5-pro"
            instructions: |
              You are an expert algorithm engineer and senior technical reviewer.
              Your job is to thoroughly review the algorithmic changes in this PR and ensure they are correct, optimal, and comprehensively tested.

              Focus your review on:
              - **Algorithmic Correctness**: Are the algorithms logically sound and mathematically correct?
              - **Performance**: Are there any obvious performance bottlenecks or suboptimal algorithmic choices?
              - **Testing of Algorithms**: Do the tests thoroughly evaluate the algorithms, including edge cases, boundary conditions, and complex scenarios? Ensure the algorithms are thoroughly tested.
    steps:
      - uses: actions/checkout@v4

      # Find the PR to review and write its diff and metadata to files
      # that Gemini can read.
      - name: Get PR details
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          else
            PR_NUMBER="${{ github.event.issue.number }}"
          fi

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "Could not find a PR to review. Exiting."
            exit 1
          fi

          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          gh pr diff "$PR_NUMBER" > pr_diff.txt
          gh pr view "$PR_NUMBER" --json number,title,body > pr_info.json

      # Pre-authenticate gh using a credential file rather than an env var.
      # Gemini CLI redacts env vars whose names contain TOKEN/KEY/SECRET, so
      # passing GH_TOKEN directly to the Gemini step would mean gh fails inside
      # Gemini's shell. Storing credentials via `gh auth login` sidesteps this.
      - name: Authenticate gh for Gemini
        run: echo "${{ github.token }}" | gh auth login --with-token

      - uses: google-github-actions/run-gemini-cli@v0
        env:
          GEMINI_CLI_TRUST_WORKSPACE: "true"
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: ${{ matrix.persona.model }}
          prompt: |
            ${{ matrix.persona.instructions }}

            You are reviewing PR #${{ steps.pr.outputs.number }} on NucleoBench — a large-scale benchmark for modern nucleic acid sequence design algorithms (BPNet, Malinois, Enformer, etc.) across various biological tasks like transcription factor binding and gene expression.

            Start by reading these files:
            1. pr_diff.txt — the full git diff of the PR
            2. pr_info.json — the PR title and description

            Write a review from your persona's perspective that covers:
            - Correctness within your focus area: do the changes seem correct without introducing regressions?
            - Adherence to any repository conventions or standards you identify.
            - Edge cases or risks: anything that could break or behave incorrectly?
            - Overall recommendation from your persona's perspective: Approve / Request changes / Needs discussion

            Be concise and specific. Reference exact file names and line numbers. If the PR has nothing in your focus area, say so in one or two sentences rather than padding the review with generic comments.

            When the review is written, post it as a comment by running:
            gh pr comment ${{ steps.pr.outputs.number }} --body "## ${{ matrix.persona.name }} Review

            <your full review here>"
