name: Integration Tests (GHCR)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/move37-labs/nucleobench:latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Run integration test
        # Ensure the step runs in a bash shell
        # NOTE: `...pytest -n auto -v integration_tests/docker_entrypoint_test.py...` is not supported in the GHCR container, so we disable.
        shell: bash
        run: |
          micromamba run -n base pytest -n auto -v integration_tests/docker_entrypoint_test.py